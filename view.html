<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ข้อมูลดิบผลตรวจ — แอปหาน้ำหนักแห้ง</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Noto+Sans+Thai:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --forest:#1F3D2B; --gold:#E8A33D; --gold-dark:#B87C22; --cream:#F5F7ED;
  --card:#FFFFFF; --text-primary:#22291F; --text-secondary:#5C6B57; --text-muted:#94A08E;
  --success:#3F8F5C; --success-bg:#E7F3EA; --danger:#C24A3D; --danger-bg:#FBEBE8;
  --border:#E1E4D8; --radius:14px;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--cream);color:var(--text-primary);font-family:'Noto Sans Thai',sans-serif;-webkit-font-smoothing:antialiased;}
h1,h2{font-family:'Kanit',sans-serif;font-weight:600;}
.mono{font-family:'JetBrains Mono',monospace;}
.topbar{background:var(--forest);color:#fff;padding:1.1rem 1.25rem 1.3rem;border-radius:0 0 20px 20px;}
.topbar h1{font-size:16px;margin:0;color:#fff;}
.topbar p{font-size:11.5px;margin:3px 0 0;color:#C9D6C4;}
main{max-width:480px;margin:0 auto;padding:1.25rem 1.25rem 3rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.1rem 1.2rem;margin-bottom:14px;}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:13.5px;}
.meta div span{color:var(--text-secondary);display:block;font-size:11.5px;margin-bottom:1px;}
table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:10px;}
th,td{border:1px solid var(--border);padding:6px 8px;text-align:left;}
th{background:#F0F2E8;font-weight:600;}
.pct-hero{text-align:center;padding:1.4rem 0 0.4rem;}
.pct-hero .val{font-family:'JetBrains Mono';font-size:40px;font-weight:600;}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:999px;font-size:14px;font-weight:600;font-family:'Kanit';margin-top:10px;}
.status-badge.pass{background:var(--success-bg);color:var(--success);}
.status-badge.fail{background:var(--danger-bg);color:var(--danger);}
.status-badge.none{background:#EFEFEA;color:var(--text-secondary);}
.status-badge.ref{background:#FBF1DE;color:var(--gold-dark);border:1px solid #EFD9A8;}
.disclaimer{font-size:11.5px;color:var(--text-muted);text-align:center;line-height:1.5;margin-top:14px;}
.rounds-row td{background:#F7F8F2;font-size:11px;color:var(--text-secondary);padding:5px 8px;border-top:none;}
.error-box{text-align:center;padding:3rem 1rem;color:var(--text-secondary);}
.section-label{font-size:12px;color:var(--text-secondary);font-weight:500;margin:0 0 6px 2px;text-transform:uppercase;letter-spacing:0.5px;}
</style>
</head>
<body>
<div class="topbar">
  <h1 id="hdr-title">ข้อมูลดิบผลตรวจน้ำหนักเนื้อแห้ง</h1>
  <p id="hdr-sub">หน้าดูข้อมูลย้อนหลังจากการสแกน QR</p>
</div>
<main id="main"></main>

<script>
function b64DecodeUnicode(str){
  return decodeURIComponent(atob(str).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
}

function render(){
  const params = new URLSearchParams(window.location.search);
  const d = params.get('d');
  const main = document.getElementById('main');

  if(!d){
    main.innerHTML = `<div class="error-box"><p>ไม่พบข้อมูลใน QR นี้</p></div>`;
    return;
  }

  let r;
  try{
    r = JSON.parse(b64DecodeUnicode(d));
  }catch(e){
    main.innerHTML = `<div class="error-box"><p>อ่านข้อมูลจาก QR ไม่สำเร็จ ลิงก์อาจไม่สมบูรณ์</p></div>`;
    return;
  }

  const dateStr = r.d ? new Date(r.d).toLocaleDateString('th-TH', {day:'numeric',month:'long',year:'numeric'}) : '—';
  const methodText = r.m==='mw' ? 'ไมโครเวฟ' : 'ตู้อบลมร้อน';

  // fruit type: 'durian' judges pass/fail; 'avocado' is reference-only.
  // Old QR codes: durian ones carry st=pass/fail; avocado ones have st absent/none.
  const fruit = r.fr || (r.st==='pass'||r.st==='fail' ? 'durian' : 'avocado');
  const hasThreshold = r.th!==null && r.th!==undefined;

  // update header/title for the fruit
  const fruitNameTh = fruit==='avocado' ? 'อะโวคาโด' : 'ทุเรียน';
  document.title = 'ข้อมูลดิบผลตรวจ — แอปหาน้ำหนักแห้ง' + fruitNameTh;
  document.getElementById('hdr-title').textContent = 'ข้อมูลดิบผลตรวจน้ำหนักเนื้อแห้ง' + fruitNameTh;
  document.getElementById('hdr-sub').textContent = 'แอปหาน้ำหนักแห้ง' + fruitNameTh + ' · หน้าดูข้อมูลย้อนหลังจากการสแกน QR';

  let statusText, statusClass;
  if(fruit==='avocado'){
    // reference-only, never pass/fail
    statusText = hasThreshold ? ('📖 เกณฑ์อ้างอิง (มกษ. 31-2567) ' + r.th + '%') : 'ไม่มีเกณฑ์อ้างอิง';
    statusClass = hasThreshold ? 'ref' : 'none';
  } else {
    // durian official pass/fail
    statusText = r.st==='pass' ? 'ผ่านเกณฑ์' : r.st==='fail' ? 'ไม่ผ่านเกณฑ์' : 'ไม่มีเกณฑ์ทางการ';
    statusClass = r.st==='pass' ? 'pass' : r.st==='fail' ? 'fail' : 'none';
  }

  const rows = (r.s||[]).map(s=>`
    <tr>
      <td>ลูกที่ ${s[0]}</td>
      <td>${(s[1]||0).toFixed(2)}</td>
      <td>${(s[2]||0).toFixed(2)}</td>
      <td>${(s[3]||0).toFixed(2)}</td>
      <td>${(s[4]||0).toFixed(2)}</td>
      <td>${(s[5]||0).toFixed(1)}%</td>
    </tr>
    ${(s[6] && s[6].length) ? `<tr class="rounds-row"><td colspan="6">น้ำหนักแต่ละรอบชั่ง (g): ${s[6].map((v,i)=>'รอบ '+(i+1)+' = '+v.toFixed(2)).join(' · ')}</td></tr>` : ''}`).join('');

  main.innerHTML = `
    <div class="card">
      <div class="pct-hero">
        <div class="val mono">${(r.pct||0).toFixed(1)}%</div>
        <div class="status-badge ${statusClass}">${statusText}${(fruit!=='avocado' && hasThreshold) ? ' (เกณฑ์ '+r.th+'%)' : ''}</div>
      </div>
    </div>
    <p class="section-label">ข้อมูลสวน</p>
    <div class="card">
      <div class="meta">
        <div><span>พันธุ์</span>${r.v || '—'}</div>
        <div><span>วันที่ทดสอบ</span>${dateStr}</div>
        <div><span>สวน/เจ้าของ</span>${r.f || '—'}</div>
        <div><span>แปลง</span>${r.p || '—'}</div>
        <div><span>DAA</span>${r.daa || '—'}</div>
        <div><span>วิธีอบ</span>${methodText}</div>
        <div style="grid-column:1 / -1;"><span>พิกัด GPS</span>${r.gps || '—'}</div>
      </div>
    </div>
    <p class="section-label">ข้อมูลดิบรายลูก</p>
    <div class="card">
      <table>
        <thead><tr>
          <th>ลูกที่</th><th>น้ำหนักผล (kg)</th><th>น้ำหนักสด (g)</th><th>น้ำหนักจาน (g)</th><th>น้ำหนักแห้งสุทธิ (g)</th><th>%</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <p style="font-size:11px;color:var(--text-muted);margin-top:8px;">น้ำหนักแห้งสุทธิ = น้ำหนักรอบสุดท้าย − น้ำหนักจาน (รอบสุดท้ายคือรอบที่น้ำหนักคงที่แล้ว)</p>
    </div>
    <p class="disclaimer">ข้อมูลนี้ถอดรหัสมาจาก QR code โดยตรง ไม่ได้ดึงจากฐานข้อมูลกลาง เป็นเครื่องมือช่วยตัดสินใจเบื้องต้น ไม่ใช่ผลตรวจรับรองทางการจากหน่วยงานรัฐ</p>
  `;
}
render();
</script>
</body>
</html>
